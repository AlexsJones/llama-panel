name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-universal-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-universal-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build universal macOS app
        run: cargo tauri build --target universal-apple-darwin --bundles app

      - name: Package
        run: |
          APP_BUNDLE=$(find target -name "llama-panel.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: llama-panel.app not found"
            find target -name "*.app" -type d
            find target -path "*/bundle/*" -type f | head -20
            exit 1
          fi
          APP_DIR=$(dirname "$APP_BUNDLE")
          ARCHIVE="llama-panel-${{ github.ref_name }}-macos-universal.tar.gz"
          tar -czf "$ARCHIVE" -C "$APP_DIR" "llama-panel.app"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            llama-panel-*.tar.gz
            llama-panel-*.tar.gz.sha256

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-linux-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Linux app
        run: cargo tauri build --target x86_64-unknown-linux-gnu --bundles deb appimage

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Collect .deb
          DEB=$(find target -name "*.deb" -type f | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "llama-panel-${{ github.ref_name }}-linux-amd64.deb"
            sha256sum "llama-panel-${{ github.ref_name }}-linux-amd64.deb" > "llama-panel-${{ github.ref_name }}-linux-amd64.deb.sha256"
          fi
          # Collect .AppImage
          APPIMAGE=$(find target -name "*.AppImage" -type f | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "llama-panel-${{ github.ref_name }}-linux-amd64.AppImage"
            sha256sum "llama-panel-${{ github.ref_name }}-linux-amd64.AppImage" > "llama-panel-${{ github.ref_name }}-linux-amd64.AppImage.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            llama-panel-*.deb
            llama-panel-*.deb.sha256
            llama-panel-*.AppImage
            llama-panel-*.AppImage.sha256

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            llama-panel-*.tar.gz
            llama-panel-*.tar.gz.sha256
            llama-panel-*.deb
            llama-panel-*.deb.sha256
            llama-panel-*.AppImage
            llama-panel-*.AppImage.sha256

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-universal

      - name: Compute checksums
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(cat llama-panel-*-macos-universal.tar.gz.sha256 | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_PAT_TOKEN }}
          repository: AlexsJones/homebrew-llama-panel
          event-type: update-cask
          client-payload: |
            {
              "version": "${{ steps.checksums.outputs.version }}",
              "sha256": "${{ steps.checksums.outputs.sha256 }}"
            }
